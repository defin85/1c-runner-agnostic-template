# Project-scoped Codex configuration.
# Codex loads this file only when the repository is trusted.
# Start with:
#   - root AGENTS.md
#   - docs/agent/index.md in the template source repo
#   - docs/agent/generated-project-index.md in generated repositories
#   - make agent-verify
# Shared repo-local skills live in .agents/skills/.
# The optional MCP examples below stay commented so a fresh environment does not
# break on hosts where local MCP binaries are absent.

# [mcp_servers.claude-context]
# command = "/home/egor/.local/bin/claude-context-mcp-local"
# startup_timeout_sec = 60.0

# [mcp_servers.claude-context.env]
# EMBEDDING_MODEL = "nomic-embed-text-v2-moe"
# EMBEDDING_PROVIDER = "Ollama"
# MILVUS_ADDRESS = "127.0.0.1:20530"
# CUSTOM_EXTENSIONS = ".bsl"
# CUSTOM_IGNORE_PATTERNS = ".git/**,.venv/**,.beads/**,.agent-browser/**,.ruff_cache/**,node_modules/**,dist/**,build/**,coverage/**,openspec/changes/**,docs/archive/**,generated/**"

