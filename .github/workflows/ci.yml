name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  static:
    name: static (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-openspec

      - name: Shell syntax
        if: runner.os != 'Windows'
        run: |
          mapfile -t files < <(find scripts tests -type f -name '*.sh' | LC_ALL=C sort)
          if [ "${files[0]+set}" = "set" ]; then
            bash -n "${files[@]}"
          fi

      - name: PowerShell syntax
        shell: pwsh
        run: |
          $errors = @()
          $psFiles = @((Resolve-Path make.ps1).Path)
          $psFiles += Get-ChildItem scripts, tooling -Recurse -Filter *.ps1 | Select-Object -ExpandProperty FullName
          $psFiles | ForEach-Object {
            $null = [System.Management.Automation.Language.Parser]::ParseFile($_, [ref]$null, [ref]$errors)
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Validate OpenSpec
        if: hashFiles('openspec/**') != ''
        run: openspec validate --all --strict --no-interactive

      - name: Verify traceability layout
        if: hashFiles('openspec/changes/**') != ''
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq 'Windows') {
            ./scripts/llm/verify-traceability.ps1
          } else {
            bash ./scripts/llm/verify-traceability.sh
          }

      - name: Check skill bindings
        if: hashFiles('.claude/skills/**', '.agents/skills/**') != ''
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq 'Windows') {
            ./scripts/qa/check-skill-bindings.ps1
          } else {
            bash ./scripts/qa/check-skill-bindings.sh
          }

      - name: Check agent docs
        if: hashFiles('docs/agent/**', 'docs/exec-plans/**', 'automation/context/**', '.codex/**') != ''
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq 'Windows') {
            ./scripts/qa/check-agent-docs.ps1
          } else {
            bash ./scripts/qa/check-agent-docs.sh
          }

  fixture:
    name: fixture (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: static
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-openspec

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install fixture runtime tools
        if: runner.os != 'Windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Install Copier
        run: python -m pip install --upgrade pip copier

      - name: Cross-platform Python smoke
        run: python -m unittest tests.python.test_cross_platform

      - name: Agent docs contract
        if: runner.os != 'Windows'
        run: bash tests/smoke/agent-docs-contract.sh

      - name: Direct-platform LD_PRELOAD contract
        if: runner.os != 'Windows'
        run: bash tests/smoke/runtime-direct-platform-ld-preload-contract.sh

  runtime-gate:
    name: runtime-gate
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: static
    outputs:
      ci_profile_present: ${{ steps.detect.outputs.present }}
    steps:
      - uses: actions/checkout@v5

      - id: detect
        name: Detect env/ci.json
        run: |
          if [ -f env/ci.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

  runtime:
    name: runtime
    if: github.event_name == 'workflow_dispatch' && needs.runtime-gate.outputs.ci_profile_present == 'true'
    runs-on:
      - self-hosted
      - linux
      - 1c
    needs:
      - static
      - runtime-gate
    steps:
      - uses: actions/checkout@v5

      - name: Runtime doctor
        run: ./scripts/diag/doctor.sh --profile env/ci.json --run-root ./.artifacts/runtime/doctor

      - name: Runtime smoke
        run: ./scripts/test/run-smoke.sh --profile env/ci.json --run-root ./.artifacts/runtime/smoke

      - name: Runtime xUnit
        run: ./scripts/test/run-xunit.sh --profile env/ci.json --run-root ./.artifacts/runtime/xunit

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-artifacts
          path: ./.artifacts/runtime
          if-no-files-found: ignore
