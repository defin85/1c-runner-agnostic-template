name: Setup OpenSpec CLI
description: Install Node.js and the OpenSpec CLI for CI jobs.

inputs:
  node-version:
    description: Node.js version for the OpenSpec CLI runtime.
    required: false
    default: "22"
  openspec-version:
    description: Version suffix passed to @fission-ai/openspec.
    required: false
    default: "latest"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install OpenSpec CLI
      shell: pwsh
      run: |
        $installRoot = if ($env:RUNNER_TEMP) {
          Join-Path $env:RUNNER_TEMP "openspec-cli"
        } else {
          Join-Path $env:HOME ".cache/openspec-cli"
        }
        $binDir = Join-Path (Join-Path $installRoot "node_modules") ".bin"
        if (Test-Path $installRoot) {
          Remove-Item -Recurse -Force $installRoot
        }
        npm install --prefix $installRoot "@fission-ai/openspec@${{ inputs.openspec-version }}"
        $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
