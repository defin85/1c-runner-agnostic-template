_min_copier_version: "9.6.0"
_answers_file: .copier-answers.yml
_templates_suffix: ""
_envops:
  autoescape: false
  keep_trailing_newline: true
  variable_start_string: "[[["
  variable_end_string: "]]]"
_exclude:
  - .git
  - .git/**
  - .githooks
  - .githooks/**
  - copier.yml
  - .github/workflows/ci.yml
  - AGENTS.md
  - CLAUDE.md
  - openspec
  - openspec/**
  - .claude/commands
  - .claude/commands/**
  - tooling
  - tooling/**
  - scripts/release
  - scripts/release/**
  - tests/smoke/template-release-workflow.sh
  - automation/context/template-source-project-map.md
  - automation/context/template-source-metadata-index.json
  - automation/context/template-source-tree.txt
  - automation/context/template-source-source-files.txt
_message_before_update: |-
  Перед `copier update`:
    - убедитесь, что конечный проект находится в Git и рабочее дерево чистое;
    - используйте этот путь только как migration bridge для старых generated repos;
    - после миграции ongoing maintenance должен идти через `./scripts/template/update-template.sh`.
_tasks:
  - command: >-
      bash ./scripts/bootstrap/copier-post-copy.sh
      "[[[ _src_path ]]]"
      "[[[ project_name ]]]"
      "[[[ project_slug ]]]"
      "[[[ project_description ]]]"
      "[[[ preferred_adapter ]]]"
      "[[[ openspec_tools ]]]"
      "[[[ 'yes' if init_git_repository else 'no' ]]]"
      "[[[ 'yes' if init_beads else 'no' ]]]"
      "[[[ beads_prefix ]]]"
    when: "[[[ _copier_operation == 'copy' ]]]"
  - command: >-
      bash ./scripts/bootstrap/copier-post-update.sh
      "[[[ _src_path ]]]"
      "[[[ project_name ]]]"
      "[[[ project_slug ]]]"
      "[[[ project_description ]]]"
      "[[[ 'yes' if init_beads else 'no' ]]]"
    when: "[[[ _copier_operation == 'update' ]]]"

project_name:
  type: str
  help: Человекочитаемое имя проекта
  default: "My 1C Project"

project_slug:
  type: str
  help: Идентификатор проекта для путей, каталогов и default-настроек
  default: "my-1c-project"

project_description:
  type: str
  help: Краткое описание проекта
  default: "1С-проект на шаблоне runner-agnostic monorepo"

preferred_adapter:
  type: str
  help: Предпочтительный adapter для launcher-скриптов
  choices:
    - direct-platform
    - remote-windows
    - vrunner
  default: direct-platform

openspec_tools:
  type: str
  help: Значение для openspec init --tools
  default: "none"

init_git_repository:
  type: bool
  help: Выполнить git init после создания проекта
  default: true

init_beads:
  type: bool
  help: Инициализировать beads в stealth-режиме. Требует git-репозиторий.
  when: "[[[ init_git_repository ]]]"
  default: "[[[ init_git_repository ]]]"

beads_prefix:
  type: str
  help: Префикс задач beads; если пусто, используется project_slug
  when: "[[[ init_beads ]]]"
  default: ""
